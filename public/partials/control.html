<div class="card h-100">
    <div class="card-header"><span class="icon">CTL</span> Kontrol Motor</div>
    <div class="card-body">
        <div class="motor-control-panel h-100">
            <span class="label-value">Kontrol Motor Stepper ESP32</span>
            <p class="motor-position">
                Posisi simulasi: <span id="motorPosition">0</span> step
            </p>
            <div class="motor-actions">
                <button id="motorUpBtn" class="btn btn-success">Naik</button>
                <button id="motorDownBtn" class="btn btn-danger">Turun</button>
            </div>
            <div id="motorStatus" class="motor-status">
                Status: <span>Siap</span>
            </div>
        </div>
    </div>
</div>
