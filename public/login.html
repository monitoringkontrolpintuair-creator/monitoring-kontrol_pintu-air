<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CPE210 Monitoring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-card auth-panel active" id="loginPanel">
            <div class="auth-brand">
                <span class="auth-kicker">CPE210 Monitoring</span>
                <h1>Masuk ke Dashboard</h1>
                <p>Untuk melihat panel lengkap dan kontrol fitur, login terlebih dahulu.</p>
                <p class="auth-hint"><a href="/" style="color: var(--primary-blue); text-decoration: none; font-weight: 700;">← Kembali ke landing page</a></p>
            </div>

            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="loginUsername">Username</label>
                    <input
                        type="text"
                        id="loginUsername"
                        name="username"
                        placeholder="Masukkan username"
                        required
                        minlength="3"
                        autocomplete="username"
                    >
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input
                        type="password"
                        id="loginPassword"
                        name="password"
                        placeholder="Masukkan password"
                        required
                        minlength="6"
                        autocomplete="current-password"
                    >
                </div>

                <button type="submit" class="login-btn" id="loginBtn">Login</button>
                <div class="error-message" id="loginErrorMessage"></div>
                <div class="success-message" id="loginSuccessMessage"></div>
            </form>

            <p class="auth-hint">Belum punya akun? <button type="button" class="auth-link" id="showSignupBtn">Sign Up</button></p>
        </section>

        <section class="auth-card auth-panel" id="signupPanel">
            <div class="auth-brand">
                <span class="auth-kicker">Buat Akun Baru</span>
                <h1>Sign Up</h1>
                <p>Daftarkan akun operator sebelum mengakses dashboard monitoring.</p>
            </div>

            <form class="login-form" id="signupForm">
                <div class="form-group">
                    <label for="signupUsername">Username</label>
                    <input
                        type="text"
                        id="signupUsername"
                        name="username"
                        placeholder="Buat username"
                        required
                        minlength="3"
                        autocomplete="username"
                    >
                </div>

                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <input
                        type="password"
                        id="signupPassword"
                        name="password"
                        placeholder="Buat password"
                        required
                        minlength="6"
                        autocomplete="new-password"
                    >
                </div>

                <button type="submit" class="login-btn" id="signupBtn">Buat Akun</button>
                <div class="error-message" id="signupErrorMessage"></div>
            </form>

            <p class="auth-hint">Sudah punya akun? <button type="button" class="auth-link" id="showLoginBtn">Login</button></p>
        </section>
    </main>

    <script src="js/login.js"></script>
</body>
</html>
